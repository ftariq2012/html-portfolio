    <main class="contact-page">
      <h1 class="main-heading">Contact Me</h1>

      <section class="contact-card">
        <div class="contact-intro">
          <p class="project-kicker">Get in touch</p>
          <h2>Let's connect</h2>
        </div>

        <div class="contact-links">
          <a
            class="contact-link-card"
            href="https://www.linkedin.com/in/muhammad-faraz-tariq/"
            target="_blank"
            rel="noopener noreferrer"
          >
            <span class="contact-icon linkedin-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24">
                <path
                  fill="currentColor"
                  d="M4.98 3.5C4.98 4.88 3.86 6 2.5 6S0 4.88 0 3.5 1.12 1 2.5 1s2.48 1.12 2.48 2.5ZM.25 8h4.5v15h-4.5V8Zm7.25 0h4.31v2.05h.06c.6-1.14 2.07-2.34 4.26-2.34 4.56 0 5.4 3 5.4 6.9V23h-4.5v-7.44c0-1.77-.03-4.05-2.47-4.05-2.47 0-2.85 1.93-2.85 3.92V23h-4.5V8Z"
                />
              </svg>
            </span>
            <span>
              <strong>LinkedIn</strong>
            </span>
          </a>

          <a
            class="contact-link-card"
            href="https://github.com/ftariq2012"
            target="_blank"
            rel="noopener noreferrer"
          >
            <span class="contact-icon github-icon" aria-hidden="true">
              <svg viewBox="0 0 16 16">
                <path
                  fill="currentColor"
                  d="M8 0C3.58 0 0 3.67 0 8.2c0 3.63 2.29 6.7 5.47 7.79.4.08.55-.18.55-.4v-1.52c-2.23.5-2.7-.98-2.7-.98-.36-.95-.89-1.2-.89-1.2-.73-.51.05-.5.05-.5.81.06 1.24.85 1.24.85.72 1.27 1.89.9 2.35.69.07-.53.28-.9.51-1.1-1.78-.21-3.64-.91-3.64-4.05 0-.9.31-1.62.83-2.2-.08-.21-.36-1.05.08-2.18 0 0 .68-.22 2.22.84A7.45 7.45 0 0 1 8 3.96c.69 0 1.38.1 2.02.28 1.54-1.06 2.22-.84 2.22-.84.44 1.13.16 1.97.08 2.18.52.58.83 1.3.83 2.2 0 3.15-1.87 3.84-3.65 4.05.29.26.54.76.54 1.54v2.22c0 .22.15.48.55.4A8.11 8.11 0 0 0 16 8.2C16 3.67 12.42 0 8 0Z"
                />
              </svg>
            </span>
            <span>
              <strong>GitHub</strong>
            </span>
          </a>
        </div>
      </section>

      <section class="message-card">
        <div class="message-card-copy">
          <p class="project-kicker">Send a message</p>
          <h2>Write to me directly</h2>
        </div>

        <form
          class="contact-form"
          id="messageForm"
          action="https://api.web3forms.com/submit"
          method="POST"
        >
          <input
            type="hidden"
            name="access_key"
            value="fe4c0a53-c0cf-44e0-9a21-e14af2b7f40d"
          />
          <input
            type="hidden"
            name="subject"
            value="New portfolio message from faraztariq.me"
          />
          <input type="checkbox" name="botcheck" class="hidden-field" />

          <div class="form-grid">
            <label>
              Name
              <input
                type="text"
                name="name"
                autocomplete="name"
                placeholder="Your name"
                required
              />
            </label>

            <label>
              Email
              <input
                type="email"
                name="email"
                autocomplete="email"
                placeholder="your.email@example.com"
                required
              />
            </label>
          </div>

          <label>
            Message
            <textarea
              name="message"
              rows="6"
              placeholder="Tell me what you want to connect about"
              required
            ></textarea>
          </label>

          <button type="submit">Send Message</button>
          <p class="form-message" id="messageFormStatus" aria-live="polite"></p>
        </form>
      </section>

      <section class="private-contact-card">
        <div>
          <p class="project-kicker">Human check</p>
          <h2>Reveal direct contact info</h2>
        </div>

        <form class="captcha-form" id="contactCaptcha">
          <label for="captchaAnswer">What is 7 + 5?</label>
          <div class="captcha-row">
            <input
              id="captchaAnswer"
              name="captchaAnswer"
              type="number"
              inputmode="numeric"
              autocomplete="off"
              placeholder="Answer"
              required
            />
            <button type="submit">Reveal</button>
          </div>
          <p class="captcha-message" id="captchaMessage" aria-live="polite"></p>
        </form>

        <div class="private-contact-info" id="privateContactInfo" hidden>
          <a class="private-info-line" data-contact-link="email">
            <span class="contact-icon email-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24">
                <path
                  fill="currentColor"
                  d="M3 5h18a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2Zm9 8.15L3.78 7H3v.35l9 6.75 9-6.75V7h-.78L12 13.15Z"
                />
              </svg>
            </span>
            <span data-contact-value="email"></span>
          </a>

          <a class="private-info-line" data-contact-link="phone">
            <span class="contact-icon phone-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24">
                <path
                  fill="currentColor"
                  d="M6.62 10.79c1.44 2.83 3.76 5.15 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1C10.61 21 3 13.39 3 4c0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.24.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2Z"
                />
              </svg>
            </span>
            <span data-contact-value="phone"></span>
          </a>
        </div>
      </section>
    </main>
